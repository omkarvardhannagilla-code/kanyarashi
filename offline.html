<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — KanyaRashi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --accent: #c8ff00;
      --accent3: #7c3aed;
      --text: #f0f0f0;
      --muted: #555;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* noise overlay */
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:9999; opacity:.3;
    }

    /* ambient glow */
    .glow {
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      pointer-events:none;
    }
    .glow-1 { width:400px; height:400px; background:rgba(124,58,237,.15); top:-100px; left:-100px; animation:driftA 8s ease-in-out infinite alternate; }
    .glow-2 { width:300px; height:300px; background:rgba(200,255,0,.06); bottom:-80px; right:-60px; animation:driftB 10s ease-in-out infinite alternate; }
    @keyframes driftA { to { transform:translate(60px, 80px); } }
    @keyframes driftB { to { transform:translate(-50px,-60px); } }

    /* — Signal tower animation — */
    .signal-wrap {
      position:relative;
      width:120px; height:120px;
      margin-bottom:48px;
      display:flex; align-items:center; justify-content:center;
    }

    /* Tower icon SVG */
    .tower-icon {
      width:60px; height:60px;
      position:relative; z-index:2;
      animation:shake 3s ease-in-out infinite;
    }
    @keyframes shake {
      0%,100%{ transform:rotate(0deg); }
      20%    { transform:rotate(-4deg); }
      40%    { transform:rotate(4deg); }
      60%    { transform:rotate(-2deg); }
      80%    { transform:rotate(2deg); }
    }

    /* Pulsing rings around tower */
    .ring {
      position:absolute;
      border-radius:50%;
      border:1.5px solid var(--accent);
      opacity:0;
      animation:ringOut 2.4s ease-out infinite;
    }
    .ring:nth-child(1){ width:80px;  height:80px;  animation-delay:0s; }
    .ring:nth-child(2){ width:110px; height:110px; animation-delay:.6s; }
    .ring:nth-child(3){ width:140px; height:140px; animation-delay:1.2s; }
    @keyframes ringOut {
      0%   { opacity:.6; transform:scale(.5); }
      100% { opacity:0;  transform:scale(1.2); }
    }

    /* Slash through the rings — "no signal" cross */
    .no-signal-cross {
      position:absolute;
      width:140px; height:2px;
      background:linear-gradient(to right, transparent, rgba(255,80,80,.8), transparent);
      transform:rotate(-40deg);
      top:50%; left:50%; margin-top:-1px; margin-left:-70px;
      animation:crossPulse 2s ease-in-out infinite;
    }
    @keyframes crossPulse {
      0%,100%{ opacity:.6; }
      50%    { opacity:1; }
    }

    /* — Disconnected dots zig-zag — */
    .dots-row {
      display:flex; align-items:center; gap:8px;
      margin-bottom:48px;
    }
    .dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--accent);
      animation:dotBlink 1.6s ease-in-out infinite;
    }
    .dot:nth-child(1){ animation-delay:0s; }
    .dot:nth-child(2){ animation-delay:.2s; background:rgba(200,255,0,.4); }
    .dot:nth-child(3){ animation-delay:.4s; }
    .dot:nth-child(4){ animation-delay:.6s; background:rgba(200,255,0,.4); }
    .dot:nth-child(5){ animation-delay:.8s; }
    .dash { width:20px; height:2px; background:rgba(255,255,255,.1); border-radius:2px; }
    @keyframes dotBlink {
      0%,100%{ opacity:1; transform:translateY(0); }
      50%    { opacity:.15; transform:translateY(-4px); }
    }

    /* — Logo — */
    .brand {
      font-family:'Bebas Neue', sans-serif;
      font-size:20px;
      letter-spacing:6px;
      color:var(--accent);
      margin-bottom:32px;
      opacity:.6;
    }

    /* — Main message — */
    .headline {
      font-family:'Bebas Neue', sans-serif;
      font-size:clamp(48px,10vw,90px);
      line-height:.95;
      text-align:center;
      margin-bottom:20px;
    }
    .headline .top    { display:block; color:var(--text); }
    .headline .bottom { display:block; color:var(--accent); }

    .sub {
      font-family:'DM Sans', sans-serif;
      font-size:clamp(14px,2vw,17px);
      color:var(--muted);
      text-align:center;
      line-height:1.8;
      max-width:420px;
      margin-bottom:48px;
    }

    /* — Retry button — */
    .retry-btn {
      display:inline-flex; align-items:center; gap:10px;
      padding:14px 36px;
      background:transparent;
      border:1px solid var(--accent);
      border-radius:4px;
      font-family:'Syne', sans-serif;
      font-size:13px;
      font-weight:700;
      letter-spacing:3px;
      text-transform:uppercase;
      color:var(--accent);
      cursor:pointer;
      transition:all .3s;
      position:relative;
      overflow:hidden;
    }
    .retry-btn::before {
      content:'';
      position:absolute; inset:0;
      background:var(--accent);
      transform:translateX(-100%);
      transition:transform .3s;
      z-index:0;
    }
    .retry-btn:hover::before { transform:translateX(0); }
    .retry-btn:hover { color:#000; }
    .retry-btn span, .retry-btn svg { position:relative; z-index:1; }
    .retry-btn svg { transition:transform .3s; }
    .retry-btn:hover svg { transform:rotate(360deg); }

    /* — Status strip at bottom — */
    .status-strip {
      position:fixed;
      bottom:0; left:0; right:0;
      height:3px;
      background:linear-gradient(to right, var(--accent3), transparent, var(--accent3));
      background-size:200% 100%;
      animation:stripSlide 3s linear infinite;
    }
    @keyframes stripSlide {
      0%  { background-position:0% 0; }
      100%{ background-position:200% 0; }
    }

    /* footer note */
    .offline-note {
      position:fixed;
      bottom:20px;
      font-family:'DM Sans', sans-serif;
      font-size:11px;
      letter-spacing:4px;
      text-transform:uppercase;
      color:var(--muted);
    }
  </style>
</head>
<body>

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Brand -->
  <div class="brand">KANYARASHI</div>

  <!-- Signal tower with no-signal animation -->
  <div class="signal-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="no-signal-cross"></div>

    <!-- WiFi/signal tower SVG -->
    <svg class="tower-icon" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- tower mast -->
      <line x1="30" y1="52" x2="30" y2="28" stroke="#c8ff00" stroke-width="3" stroke-linecap="round"/>
      <!-- tower base legs -->
      <line x1="30" y1="52" x2="18" y2="56" stroke="#c8ff00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="52" x2="42" y2="56" stroke="#c8ff00" stroke-width="2.5" stroke-linecap="round"/>
      <!-- cross bar -->
      <line x1="22" y1="42" x2="38" y2="42" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>
      <!-- signal arcs — broken/faded -->
      <path d="M20 24 Q30 14 40 24" stroke="rgba(200,255,0,0.2)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M14 18 Q30 5 46 18"  stroke="rgba(200,255,0,0.1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- signal tip dot -->
      <circle cx="30" cy="26" r="2.5" fill="#c8ff00" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <!-- X mark over top arc -->
      <line x1="24" y1="10" x2="36" y2="22" stroke="rgba(255,80,80,.7)" stroke-width="2" stroke-linecap="round"/>
      <line x1="36" y1="10" x2="24" y2="22" stroke="rgba(255,80,80,.7)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Disconnected dots row -->
  <div class="dots-row">
    <div class="dot"></div>
    <div class="dash"></div>
    <div class="dot"></div>
    <div class="dash"></div>
    <div class="dot"></div>
    <div class="dash"></div>
    <div class="dot"></div>
    <div class="dash"></div>
    <div class="dot"></div>
  </div>

  <!-- Message -->
  <h1 class="headline">
    <span class="top">YOU ARE</span>
    <span class="bottom">OFFLINE</span>
  </h1>

  <p class="sub">
    Looks like you've lost your connection.<br>
    Check your WiFi or mobile data, then try again.
  </p>

  <!-- Retry -->
  <button class="retry-btn" onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M1 4v6h6M23 20v-6h-6"/>
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>
    <span>Try Again</span>
  </button>

  <div class="status-strip"></div>
  <div class="offline-note">Made with ♥ by Team KanyaRashi</div>

  <script>
    // Auto reload when connection is restored
    window.addEventListener('online', () => {
      document.querySelector('.headline .bottom').textContent = 'BACK ONLINE!';
      document.querySelector('.sub').textContent = 'Connection restored. Redirecting you now...';
      setTimeout(() => window.location.replace(document.referrer || '/'), 1200);
    });
  </script>
</body>
</html>
